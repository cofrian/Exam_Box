<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entregas - ExamBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-box"></i> ExamBox
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/professor/exams">Exámenes</a>
                <a class="nav-link active" href="/professor/submissions">Entregas</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2><i class="bi bi-cloud-download"></i> Entregas de Exámenes</h2>
        
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-journal-text"></i> Exámenes
                    </div>
                    <div class="list-group list-group-flush" id="examsList">
                        {% for exam in exams %}
                        <button class="list-group-item list-group-item-action" 
                                data-exam-id="{{ exam.id }}" 
                                data-exam-name="{{ exam.name }}"
                                onclick="loadSubmissions(this.dataset.examId, this.dataset.examName)">
                            {{ exam.name }}
                            <small class="text-muted d-block">{{ exam.subject }}</small>
                        </button>
                        {% else %}
                        <div class="list-group-item text-muted">
                            No hay exámenes
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-file-earmark-zip"></i> 
                        Entregas: <span id="currentExamName">Selecciona un examen</span>
                    </div>
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Alumno</th>
                                    <th>Fecha</th>
                                    <th>Tamaño</th>
                                    <th>Tipo</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody id="submissionsTable">
                                <tr>
                                    <td colspan="5" class="text-center text-muted">
                                        Selecciona un examen para ver sus entregas
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function formatBytes(bytes) {
            if (!bytes) return 'N/A';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleString('es-ES');
        }
        
        async function loadSubmissions(examId, examName) {
            document.getElementById('currentExamName').textContent = examName;
            
            // Mark active
            document.querySelectorAll('#examsList .list-group-item').forEach(el => {
                el.classList.remove('active');
            });
            event.target.closest('.list-group-item').classList.add('active');
            
            try {
                const response = await fetch(`/api/submissions/${examId}`);
                const submissions = await response.json();
                
                const tbody = document.getElementById('submissionsTable');
                
                if (submissions.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="text-center text-muted">
                                No hay entregas para este examen
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                tbody.innerHTML = submissions.map(sub => `
                    <tr>
                        <td><strong>${sub.student_id}</strong></td>
                        <td>${formatDate(sub.submitted_at)}</td>
                        <td>${formatBytes(sub.file_size)}</td>
                        <td>
                            ${sub.is_auto_submit 
                                ? '<span class="badge bg-warning">Auto</span>' 
                                : '<span class="badge bg-success">Manual</span>'}
                        </td>
                        <td>
                            <a href="/api/submissions/download/${sub.id}" 
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-download"></i> Descargar
                            </a>
                        </td>
                    </tr>
                `).join('');
                
            } catch (err) {
                console.error('Error:', err);
                alert('Error al cargar entregas');
            }
        }
    </script>
</body>
</html>
