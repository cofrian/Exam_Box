<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen - {{ exam.name }} - ExamBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .timer-display {
            font-size: 2.5rem;
            font-weight: bold;
            font-family: monospace;
        }
        .timer-warning { color: #ffc107 !important; }
        .timer-critical { color: #dc3545 !important; animation: pulse 1s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .start-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        /* Panel de examen con JupyterLab embebido */
        .exam-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .exam-header {
            background: #212529;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .jupyter-container {
            flex: 1;
            border: none;
        }
        .jupyter-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="bg-dark text-white m-0 p-0">
    <!-- Pantalla de inicio -->
    <div id="startScreen" class="start-screen">
        <div class="text-center">
            <h1 class="mb-4"><i class="bi bi-journal-code"></i> {{ exam.name }}</h1>
            <p class="lead">{{ session.student_name }} ({{ session.student_id }})</p>
            <div class="mb-4">
                <span class="badge bg-info fs-5"><i class="bi bi-clock"></i> {{ exam.duration_minutes }} minutos</span>
                <span class="badge bg-secondary fs-5 ms-2"><i class="bi bi-list-ol"></i> {{ exam.num_questions }} preguntas</span>
            </div>
            <button class="btn btn-success btn-lg px-5 py-3" onclick="startExam()">
                <i class="bi bi-play-fill"></i> COMENZAR EXAMEN
            </button>
            <p class="mt-3 text-muted small">
                Solo verás tu carpeta de trabajo personal.
            </p>
        </div>
    </div>
    
    <!-- Pantalla de examen con header fijo + JupyterLab -->
    <div id="examContainer" class="exam-container" style="display: none;">
        <!-- Barra superior fija con timer y botón entregar -->
        <div class="exam-header">
            <div>
                <strong><i class="bi bi-person-fill"></i> {{ session.student_name }}</strong>
                <span class="text-muted ms-2">({{ session.student_id }})</span>
                <span class="badge bg-primary ms-3">{{ exam.name }}</span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="text-center">
                    <small class="text-muted d-block">TIEMPO</small>
                    <span class="timer-display" id="timerDisplay">{{ exam.duration_minutes }}:00</span>
                </div>
                <button class="btn btn-success btn-lg" onclick="submitExam()">
                    <i class="bi bi-send-fill"></i> ENTREGAR
                </button>
            </div>
        </div>
        
        <!-- JupyterLab embebido - solo muestra la carpeta del alumno -->
        <div class="jupyter-container">
            <iframe id="jupyterFrame" src="about:blank" allow="clipboard-read; clipboard-write"></iframe>
        </div>
    </div>

    <script>
        const sessionId = {{ session.id }};
        const studentId = "{{ session.student_id }}";
        const examDuration = {{ exam.duration_minutes }};
        let timeRemaining = examDuration * 60;
        let timerInterval;
        
        function startExam() {
            fetch(`/api/students/${sessionId}/start`, { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'error') {
                        alert('Error: ' + data.message);
                        return;
                    }
                    
                    // Ocultar pantalla de inicio, mostrar examen
                    document.getElementById('startScreen').style.display = 'none';
                    document.getElementById('examContainer').style.display = 'flex';
                    
                    // Cargar JupyterLab directamente en la carpeta del alumno
                    const jupyterUrl = `http://localhost:8888/lab/tree/${studentId}?token=exambox123`;
                    document.getElementById('jupyterFrame').src = jupyterUrl;
                    
                    // Iniciar temporizador
                    startTimer();
                })
                .catch(err => {
                    alert('Error al iniciar: ' + err.message);
                });
        }
        
        function startTimer() {
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    alert('¡El tiempo ha terminado! Tu examen será entregado automáticamente.');
                    submitExam();
                }
            }, 1000);
        }
        
        function updateTimerDisplay() {
            const hours = Math.floor(timeRemaining / 3600);
            const minutes = Math.floor((timeRemaining % 3600) / 60);
            const seconds = timeRemaining % 60;
            
            const display = document.getElementById('timerDisplay');
            display.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            // Cambiar color según tiempo restante
            if (timeRemaining < 300) {
                display.classList.add('timer-critical');
            } else if (timeRemaining < 600) {
                display.classList.add('timer-warning');
            }
        }
        
        function submitExam() {
            if (!confirm('¿Estás seguro de que quieres entregar el examen?')) return;
            
            fetch(`/api/submit/${sessionId}`, { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    clearInterval(timerInterval);
                    alert('✅ Examen entregado correctamente');
                    window.location.href = '/student';
                })
                .catch(err => {
                    alert('Error al entregar: ' + err.message);
                });
        }
    </script>
</body>
</html>
